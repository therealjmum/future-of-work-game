<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden;background:#1A1917;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .wrap{position:relative;width:1200px;height:630px;background:#1A1917;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 80px}
  .glow{position:absolute;top:-180px;right:-120px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(204,85,0,.35) 0%,rgba(204,85,0,.1) 40%,transparent 70%);pointer-events:none}
  .glow2{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(to top,rgba(0,0,0,.35),transparent);pointer-events:none}
  .eyebrow{font-size:20px;font-weight:600;color:#CC5500;letter-spacing:4px;text-transform:uppercase;margin-bottom:28px}
  .line1{font-size:100px;font-weight:900;color:#ffffff;letter-spacing:-4px;line-height:.95;margin-bottom:8px}
  .line2{font-size:100px;font-weight:900;color:#3A3936;letter-spacing:-4px;line-height:.95;margin-bottom:40px}
  .sub{font-size:26px;font-weight:300;color:rgba(255,255,255,.38);letter-spacing:-.2px;margin-bottom:48px}
  .bar{width:100px;height:4px;background:#CC5500;border-radius:2px;margin-bottom:20px}
  .dots{display:flex;gap:12px;align-items:center}
  .dot{width:16px;height:16px;border-radius:50%}
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="eyebrow">Future of Work &nbsp;·&nbsp; 2030</div>
  <div class="line1">Imagine it's 2030.</div>
  <div class="line2">What do you believe?</div>
  <div class="sub">An interactive card game about work in the age of AI</div>
  <div class="bar"></div>
  <div class="dots">
    <div class="dot" style="background:#CC5500"></div>
    <div class="dot" style="background:#7C3AED"></div>
    <div class="dot" style="background:#1D4ED8"></div>
    <div class="dot" style="background:#0F766E"></div>
    <div class="dot" style="background:#D97706"></div>
    <div class="dot" style="background:#9D174D"></div>
    <div class="dot" style="background:#374151"></div>
  </div>
</div>
</body>
